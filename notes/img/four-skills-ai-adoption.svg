<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460" style="font-family: 'DM Sans', Arial, system-ui, sans-serif;">
  <defs>
    <style>
      .bg { fill: #F7F5F2; }
      .card { fill: #FFFFFF; rx: 14; }
      .card-border { fill: none; stroke: #E5E3DF; stroke-width: 1; }
      .accent-bar { fill: #3D5A80; }
      .badge { fill: #3D5A80; }
      .badge-text { fill: #FFFFFF; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
      .skill-label { fill: #3D5A80; font-size: 9.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
      .skill-title { fill: #1A1916; font-size: 15px; font-weight: 500; }
      .skill-desc { fill: #7A7870; font-size: 12px; font-weight: 300; line-height: 1.6; }
      .header-title { fill: #1A1916; font-size: 18px; font-weight: 500; }
      .header-sub { fill: #7A7870; font-size: 12px; font-weight: 300; }
      .divider { stroke: #E5E3DF; stroke-width: 1; }
      .tag { fill: #EEF1F5; }
      .tag-text { fill: #3D5A80; font-size: 9.5px; font-weight: 500; letter-spacing: 0.06em; }
      .footer-text { fill: #B0ADA8; font-size: 10px; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="460" class="bg" rx="16"/>

  <!-- Header -->
  <text x="360" y="42" text-anchor="middle" class="header-title">The Four Skills That Keep You in Control</text>
  <text x="360" y="62" text-anchor="middle" class="header-sub">What you need to develop to work with AI without losing your thinking</text>

  <!-- Divider -->
  <line x1="40" y1="80" x2="680" y2="80" class="divider"/>

  <!-- ─── CARD 1: Structure First ─── -->
  <rect x="40" y="96" width="306" height="154" rx="14" class="card"/>
  <rect x="40" y="96" width="306" height="154" rx="14" class="card-border"/>
  <rect x="40" y="96" width="3" height="154" rx="1.5" class="accent-bar"/>

  <rect x="55" y="112" width="18" height="18" rx="9" class="badge"/>
  <text x="64" y="124.5" text-anchor="middle" class="badge-text">1</text>
  <text x="82" y="122" class="skill-label">Structure First</text>

  <text x="55" y="150" class="skill-title">Define before you delegate</text>

  <text x="55" y="173" class="skill-desc">If you can&#x2019;t break the objective into</text>
  <text x="55" y="189" class="skill-desc">tasks and add context, AI will fill that</text>
  <text x="55" y="205" class="skill-desc">gap with something plausible. Clarity</text>
  <text x="55" y="221" class="skill-desc">is now non-negotiable.</text>

  <!-- ─── CARD 2: Diagnose ─── -->
  <rect x="374" y="96" width="306" height="154" rx="14" class="card"/>
  <rect x="374" y="96" width="306" height="154" rx="14" class="card-border"/>
  <rect x="374" y="96" width="3" height="154" rx="1.5" class="accent-bar"/>

  <rect x="389" y="112" width="18" height="18" rx="9" class="badge"/>
  <text x="398" y="124.5" text-anchor="middle" class="badge-text">2</text>
  <text x="416" y="122" class="skill-label">Diagnose, Don&#x2019;t Re-prompt</text>

  <text x="389" y="150" class="skill-title">Debug your instructions</text>

  <text x="389" y="173" class="skill-desc">When output is wrong, figure out why</text>
  <text x="389" y="189" class="skill-desc">before you ask again. Wrong instruction,</text>
  <text x="389" y="205" class="skill-desc">missing context, bad example — each</text>
  <text x="389" y="221" class="skill-desc">has a different fix.</text>

  <!-- ─── CARD 3: Cockpit Rule ─── -->
  <rect x="40" y="268" width="306" height="154" rx="14" class="card"/>
  <rect x="40" y="268" width="306" height="154" rx="14" class="card-border"/>
  <rect x="40" y="268" width="3" height="154" rx="1.5" class="accent-bar"/>

  <rect x="55" y="284" width="18" height="18" rx="9" class="badge"/>
  <text x="64" y="296.5" text-anchor="middle" class="badge-text">3</text>
  <text x="82" y="294" class="skill-label">The Cockpit Rule</text>

  <text x="55" y="322" class="skill-title">Decide what you actually delegate</text>

  <text x="55" y="345" class="skill-desc">AI flies the cruise. You handle takeoff</text>
  <text x="55" y="361" class="skill-desc">and landing. Ask yourself: is this a task</text>
  <text x="55" y="377" class="skill-desc">I need to stay good at? If yes, support</text>
  <text x="55" y="393" class="skill-desc">— don&#x2019;t replace.</text>

  <!-- ─── CARD 4: Protect Thinking ─── (highlighted) -->
  <rect x="374" y="268" width="306" height="154" rx="14" fill="#F0F3F7"/>
  <rect x="374" y="268" width="306" height="154" rx="14" fill="none" stroke="#C2CEDC" stroke-width="1"/>
  <rect x="374" y="268" width="3" height="154" rx="1.5" fill="#3D5A80"/>

  <rect x="389" y="284" width="18" height="18" rx="9" class="badge"/>
  <text x="398" y="296.5" text-anchor="middle" class="badge-text">4</text>
  <text x="416" y="294" class="skill-label">Protect Your Thinking</text>

  <text x="389" y="322" class="skill-title">Cognitive debt is measurable</text>

  <text x="389" y="345" class="skill-desc">MIT research found weaker brain</text>
  <text x="389" y="361" class="skill-desc">connectivity in people who offload</text>
  <text x="389" y="377" class="skill-desc">writing to AI. Keep the muscle warm.</text>
  <text x="389" y="393" class="skill-desc">Don&#x2019;t outsource your thinking.</text>

  <!-- Footer -->
  <text x="360" y="444" text-anchor="middle" class="footer-text">edsonfjr.com</text>
</svg>
